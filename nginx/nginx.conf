events {}

http {
    # `api` is the Docker Compose service name — resolved over the
    # compose-created network, the same way the `worker` service already
    # reaches `redis`/`db` by name rather than by IP or localhost.
    upstream fastapi_app {
        server api:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://fastapi_app;

            # Without these, the backend sees every request as coming from
            # Nginx itself, on scheme "http", for Host "api:8000" — not the
            # real client, real scheme, or real host the client requested.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Standard timeouts — generous enough for slower endpoints
            # (e.g. live schema discovery against a remote target database)
            # without hanging indefinitely on a truly stuck backend.
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}

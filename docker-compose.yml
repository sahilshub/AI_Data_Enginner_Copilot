# ==============================================================================
# Docker Compose Configuration for AI Data Engineering Copilot
# ==============================================================================

name: ai_copilot
services:
  api:
    container_name: api
    # Build using the local Dockerfile in the current directory context
    build:
      context: .
      dockerfile: Dockerfile

    # No ports published to the host — api is reached only through nginx
    # now (see the nginx service below and docs/phase-1/step-15.md).
    # Port 8000 still exists inside the container/Compose network for
    # nginx to proxy to.

    # Mount the local app directory to support live-reloading during development.
    volumes:
      - ./app:/workspace/app
    
    # Load environment variables from the local .env file
    env_file:
      - .env

    # Override specific env variables to match container networking
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/copilot_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    # Command to run uvicorn with reload enabled for development hot-reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    # Ensure database and broker are up before starting api service
    depends_on:
      - db
      - redis

    # Restart policy
    restart: unless-stopped

  worker:
    container_name: celery-worker
    # Same image as api — just runs a Celery worker instead of uvicorn.
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/workspace/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/copilot_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    container_name: metadata_postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=copilot_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:

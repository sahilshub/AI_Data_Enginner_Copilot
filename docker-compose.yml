# ==============================================================================
# Docker Compose Configuration for AI Data Engineering Copilot
# ==============================================================================

name: ai_copilot
services:
  api:
    container_name: api
    # Build using the local Dockerfile in the current directory context
    build:
      context: .
      dockerfile: Dockerfile

    # No ports published to the host — api is reached only through nginx
    # now (see the nginx service below and docs/phase-1/step-15.md).
    # Port 8000 still exists inside the container/Compose network for
    # nginx to proxy to.

    # Mount the local app directory to support live-reloading during development.
    volumes:
      - ./app:/workspace/app
    
    # Load environment variables from the local .env file
    env_file:
      - .env

    # Override specific env variables to match container networking
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    # Command to run uvicorn with reload enabled for development hot-reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Wait for db/redis to actually be ready to accept connections, not just started
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

  worker:
    container_name: celery-worker
    # Same image as api — just runs a Celery worker instead of uvicorn.
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/workspace/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    container_name: metadata_postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # No host port mapping — only api/worker (on this Compose network) need
    # to reach db, by service name (db:5432). Use `docker exec` for manual
    # inspection, or add a port mapping back temporarily for local debugging.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    container_name: redis
    image: redis:7-alpine
    # No host port mapping — same reasoning as db above.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

# ==============================================================================
# Docker Compose Configuration for AI Data Engineering Copilot
# ==============================================================================

services:
  api:
    # Build using the local Dockerfile in the current directory context
    build:
      context: .
      dockerfile: Dockerfile
    
    # Map the container's port 8000 to the host machine's port 8000
    ports:
      - "8000:8000"
    
    # Mount the local app directory to support live-reloading during development.
    # Any changes made on the host system are immediately mirrored in the container.
    volumes:
      - ./app:/workspace/app
    
    # Load environment variables from the local .env file
    env_file:
      - .env

    # Override specific env variables to match container networking
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=development

    # Command to run uvicorn with reload enabled for development hot-reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    # Restart policy
    restart: unless-stopped

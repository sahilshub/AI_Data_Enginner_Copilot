# ==============================================================================
# Docker Compose Configuration for AI Data Engineering Copilot
# ==============================================================================

services:
  api:
    # Build using the local Dockerfile in the current directory context
    build:
      context: .
      dockerfile: Dockerfile
    
    # Map the container's port 8000 to the host machine's port 8000
    ports:
      - "8000:8000"
    
    # Mount the local app directory to support live-reloading during development.
    volumes:
      - ./app:/workspace/app
    
    # Load environment variables from the local .env file
    env_file:
      - .env

    # Override specific env variables to match container networking
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/copilot_db

    # Command to run uvicorn with reload enabled for development hot-reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    # Ensure database is up before starting api service
    depends_on:
      - db

    # Restart policy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=copilot_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
